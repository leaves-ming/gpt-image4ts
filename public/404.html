<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI绘画工具</title>
    <script type="text/javascript">
      // 重定向到index.html，让Vue Router处理路由
      var path = window.location.pathname;
      var base = '/gpt-image-playground-vue/'; // 和vite.config.ts的base保持一致
      if (path.startsWith(base)) {
        path = path.slice(base.length);
      }
      window.location.href = base + '?path=' + encodeURIComponent(path) + window.location.hash;
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
